    <div class="modal__content">
        <div class="modal__bg"></div>
        <button class="modal__close" id="modalClose">&times;</button>
        <div id="modalForm" class="modal__form">
            <h2 class="modal__title">Заказать звонок</h2>
            <p class="modal__subtitle">Оставьте свои данные, и мы свяжемся с вами в ближайшее время</p>
            <form id="callbackForm">
                <div class="modal__field">
                    <label for="userName">Ваше имя</label>
                    <input type="text" id="userName" name="name" placeholder="Например, Александр" required>
                </div>
                <div class="modal__field">
                    <label for="userPhone">Номер телефона *</label>
                    <input type="tel" id="userPhone" name="phone" placeholder="+7 (___) ___-__-__" required>
                </div>
                <div class="modal__field">
                    <label for="userQuestion">Ваш вопрос (необязательно)</label>
                    <textarea id="userQuestion" name="question" placeholder="Опишите, что вас беспокоит..."></textarea>
                </div>
                <button type="submit" class="modal__btn">Отправить заявку</button>
                <p class="modal__privacy">
                    Нажимая на кнопку, вы соглашаетесь с 
                    <a href="privacy.html">Политикой конфиденциальности</a>
                </p>
            </form>
        </div>
        <div id="modalSuccess" class="modal__success">
            <i class="fas fa-check-circle"></i>
            <h3>Заявка отправлена!</h3>
            <p>Спасибо за доверие. Наш специалист свяжется с вами в ближайшее время.</p>
            <button class="modal__btn" id="successClose">Закрыть</button>
        </div>
    </div>
