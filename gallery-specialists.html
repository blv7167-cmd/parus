    <div id="lightbox" class="lightbox hidden" aria-hidden="true">
        <div class="lightbox__content" role="dialog" aria-modal="true" aria-label="Просмотр фотографии">
            <button type="button" class="lightbox__close" aria-label="Закрыть">
                <i class="fas fa-xmark"></i>
            </button>
            <img id="lightbox-img" class="lightbox__img" alt="Просмотр фотографии">
            <div id="lightbox-caption" class="lightbox__caption"></div>
        </div>
    </div>

<script>
(function () {
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var caption = document.getElementById('lightbox-caption');

    if (!lightbox || !lightboxImg) return;

    var closeBtn = lightbox.querySelector('.lightbox__close');
    var triggers = Array.prototype.slice.call(document.querySelectorAll('[data-lightbox-src]'));

    function openLightbox(src, title) {
        lightboxImg.src = src;

        // 🔥 превращаем \n в перенос строки
        caption.innerHTML = (title || '').replace(/\n/g, '<br>');

        lightbox.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.add('hidden');
        lightboxImg.src = '';
        caption.innerHTML = '';
        document.body.style.overflow = '';
    }

    triggers.forEach(function (el) {
        el.addEventListener('click', function () {
            openLightbox(
                el.getAttribute('data-lightbox-src'),
                el.getAttribute('data-title')
            );
        });
    });

    closeBtn.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
    });
})();
</script>
